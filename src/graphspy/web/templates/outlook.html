{% extends 'layout.html'%}

{%block content%}

<br>
<div class="col-md-6">
    <h1>Outlook Web Access</h1>
    <form id="access_token_form" class="row g-3">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" id="access_token_id" name="access_token_id" class="form-control" required>
                <button class="btn btn-outline-primary" type="button" data-bs-toggle="modal" data-bs-target="#access_token_modal" onclick="$('#access_token_modal_table').DataTable().ajax.reload(null, false)">Select...</button>
                <button type="Button" class="btn btn-outline-primary" onclick="fillAccessToken(this.closest('form'))">Set access token</button>
            </div>
        </div>
    </form>
    <br>
    <div class="row g-3">
        <div class="col-md-12">
            <p class="text-muted">Opens Outlook Web Access in a new tab. If you have an active Microsoft session in your browser, you'll be signed in automatically. Otherwise, sign in with the target account.</p>
            <button type="button" class="btn btn-primary" onclick="openOWA()">Open Outlook (OWA)</button>
            <button type="button" class="btn btn-outline-secondary ms-1" onclick="window.open('https://outlook.office365.com/owa/', '_blank')">Open OWA Directly</button>
        </div>
    </div>
    <script>
        function fillAccessToken(form) {
            let response = $.ajax({
                type: "GET",
                async: false,
                url: "/api/get_access_token/" + form.access_token_id.value
            });
            // Just validates and stores; OWA uses server-side redirect
        };
        function openOWA() {
            const tokenId = document.getElementById("access_token_id").value;
            if (!tokenId) {
                bootstrapAlert("Please select or enter an access token ID", "warning");
                return;
            }
            window.open("/api/owa_login?access_token_id=" + encodeURIComponent(tokenId), "_blank");
        }
        getActiveAccessToken(document.getElementById("access_token_form").access_token_id)
    </script>
</div>
{%endblock content%}
