<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DollarHub Mail</title>
    <style>
        :root {
            color-scheme: light;
            --blue: #0f6cbd;
            --blue-soft: #cfe4fa;
            --line: #d8dce3;
            --panel: #f5f6f8;
            --text: #242424;
            --muted: #616161;
            --danger: #b42318;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: #fff;
        }
        button, input, select { font: inherit; }
        .app {
            height: 100vh;
            display: grid;
            grid-template-rows: 52px 46px 1fr;
            background: #fff;
        }
        .topbar {
            display: grid;
            grid-template-columns: 220px minmax(260px, 560px) 1fr auto;
            gap: 1rem;
            align-items: center;
            padding: 0 .95rem;
            background: #f3f2f1;
            border-bottom: 1px solid var(--line);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: .8rem;
            color: var(--blue);
            font-size: 1.15rem;
            font-weight: 650;
        }
        .waffle {
            width: 30px;
            height: 30px;
            display: grid;
            grid-template-columns: repeat(3, 4px);
            grid-auto-rows: 4px;
            gap: 4px;
            align-content: center;
            justify-content: center;
        }
        .waffle span { background: #605e5c; border-radius: 50%; }
        .search {
            display: flex;
            align-items: center;
            gap: .55rem;
            min-height: 34px;
            background: #fff;
            border: 1px solid #c8c6c4;
            border-radius: 5px;
            padding: 0 .75rem;
            box-shadow: 0 1px 2px rgba(0,0,0,.08);
        }
        .search input { border: 0; outline: 0; width: 100%; }
        .top-actions { display: flex; gap: .55rem; align-items: center; justify-content: flex-end; }
        .account-select {
            min-width: 230px;
            border: 1px solid #c8c6c4;
            background: #fff;
            min-height: 34px;
            border-radius: 4px;
            padding: 0 .5rem;
        }
        .tabs {
            display: flex;
            align-items: center;
            gap: 1.7rem;
            padding-left: 92px;
            background: #fff;
            border-bottom: 1px solid var(--line);
        }
        .tab { height: 46px; display: inline-flex; align-items: center; color: #323130; }
        .tab.active { border-bottom: 3px solid var(--blue); font-weight: 650; }
        .main {
            min-height: 0;
            display: grid;
            grid-template-columns: 76px 350px minmax(420px, 550px) 1fr;
            background: var(--panel);
        }
        .rail {
            background: #fafafa;
            border-right: 1px solid var(--line);
            padding-top: .75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .rail-item {
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #444;
            cursor: pointer;
        }
        .rail-item.active { color: var(--blue); background: #e8f2ff; }
        .folders {
            overflow: auto;
            background: #f5f5f5;
            border-right: 1px solid var(--line);
            padding: 1rem .85rem;
        }
        .folder-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: .65rem .55rem;
            font-weight: 650;
        }
        .folder-row {
            width: 100%;
            border: 0;
            background: transparent;
            color: #323130;
            min-height: 42px;
            border-radius: 5px;
            display: grid;
            grid-template-columns: 28px 1fr auto;
            align-items: center;
            gap: .4rem;
            padding: 0 .6rem;
            text-align: left;
            cursor: pointer;
        }
        .folder-row:hover { background: #ececec; }
        .folder-row.active { background: var(--blue-soft); color: #0b4a7a; font-weight: 650; }
        .count { color: var(--blue); font-weight: 650; }
        .message-area {
            min-width: 0;
            background: #fff;
            border-right: 1px solid var(--line);
            display: grid;
            grid-template-rows: 58px 1fr;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: .55rem;
            padding: .55rem .75rem;
            border-bottom: 1px solid var(--line);
            background: #fff;
        }
        .btn {
            min-height: 36px;
            border: 1px solid #c8c6c4;
            background: #fff;
            color: #323130;
            border-radius: 4px;
            padding: 0 .8rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .45rem;
        }
        .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
        .btn:disabled { color: #a19f9d; border-color: #e1dfdd; cursor: default; }
        .messages {
            overflow: auto;
            min-height: 0;
        }
        .focus-tabs {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            padding: .8rem 1rem 0;
            background: #fff;
        }
        .focus-tab {
            padding-bottom: .55rem;
            border-bottom: 3px solid transparent;
            color: #444;
        }
        .focus-tab.active { border-color: var(--blue); font-weight: 650; }
        .mail-row {
            width: 100%;
            border: 0;
            border-top: 1px solid #edebe9;
            background: #fff;
            text-align: left;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: .4rem .8rem;
            padding: .8rem 1rem;
            cursor: pointer;
        }
        .mail-row:hover, .mail-row.active { background: #f3f8ff; }
        .mail-row.unread .from, .mail-row.unread .subject { font-weight: 700; }
        .from, .subject, .preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .time { color: var(--blue); font-size: .88rem; }
        .preview { color: var(--muted); grid-column: 1 / -1; }
        .reading {
            min-width: 0;
            background: #fff;
            overflow: auto;
        }
        .reading-inner { max-width: 980px; padding: 2rem 2.5rem; }
        .empty, .error {
            min-height: 100%;
            display: grid;
            place-items: center;
            color: var(--muted);
            text-align: center;
            padding: 2rem;
        }
        .error-card {
            max-width: 560px;
            background: #fff;
            border: 1px solid #f3b5b5;
            border-radius: 8px;
            padding: 1.4rem;
            color: var(--danger);
            box-shadow: 0 12px 30px rgba(0,0,0,.08);
        }
        .message-frame {
            width: 100%;
            min-height: 60vh;
            border: 0;
            background: #fff;
        }
        .message-head {
            border-bottom: 1px solid var(--line);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .message-head h1 { margin: .2rem 0 1rem; font-size: 1.65rem; font-weight: 600; }
        .muted { color: var(--muted); }
        @media (max-width: 1100px) {
            .main { grid-template-columns: 64px 290px 1fr; }
            .reading { display: none; }
        }
        @media (max-width: 760px) {
            body { overflow: auto; height: auto; }
            .app { height: auto; min-height: 100vh; grid-template-rows: auto auto auto; }
            .topbar { grid-template-columns: 1fr; padding: .75rem; }
            .tabs { padding-left: .75rem; gap: 1rem; overflow: auto; }
            .main { grid-template-columns: 1fr; }
            .rail { display: none; }
            .folders { max-height: 280px; }
            .message-area { min-height: 520px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <div class="waffle" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
                <span>DollarHub Mail</span>
            </div>
            <label class="search">
                <span aria-hidden="true">Search</span>
                <input id="search-input" type="search" placeholder="Search mail">
            </label>
            <div></div>
            <div class="top-actions">
                <select class="account-select" id="account-select"></select>
                <button class="btn" id="refresh-mail" type="button">Refresh</button>
            </div>
        </header>

        <nav class="tabs" aria-label="Mail actions">
            <span class="tab">File</span>
            <span class="tab active">Home</span>
            <span class="tab">View</span>
            <span class="tab">Help</span>
        </nav>

        <main class="main">
            <aside class="rail" aria-label="Apps">
                <button class="rail-item active" title="Mail">Mail</button>
            </aside>

            <aside class="folders">
                <div class="folder-title">
                    <span>Favorites</span>
                    <span class="muted">+</span>
                </div>
                <div class="folder-title" id="account-label">Mailbox</div>
                <div id="folder-list">
                    <div class="muted" style="padding:.75rem">Loading folders...</div>
                </div>
            </aside>

            <section class="message-area">
                <div class="toolbar">
                    <button class="btn btn-primary" type="button" id="new-mail">New mail</button>
                    <button class="btn" type="button" disabled>Delete</button>
                    <button class="btn" type="button" disabled>Archive</button>
                    <button class="btn" type="button" disabled>Report</button>
                    <button class="btn" type="button" disabled>Flag</button>
                    <button class="btn" type="button" id="reload-folder">Reload</button>
                </div>
                <div class="messages">
                    <div class="focus-tabs">
                        <span class="focus-tab active">Focused</span>
                        <span class="focus-tab">Other</span>
                    </div>
                    <div id="mail-list-content">
                        <div class="empty">Loading your mailbox...</div>
                    </div>
                </div>
            </section>

            <article class="reading">
                <div class="reading-inner" id="reading-pane-content">
                    <div class="empty">
                        <div>
                            <h2>Select an email</h2>
                            <p>Your messages will appear here after the mailbox loads.</p>
                        </div>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <div id="compose-panel" style="display:none; position:fixed; right:24px; bottom:24px; width:min(560px, calc(100vw - 32px)); background:#fff; border:1px solid #c8c6c4; box-shadow:0 18px 48px rgba(0,0,0,.24); z-index:20;">
        <div style="min-height:44px; background:#0f6cbd; color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 .85rem; font-weight:600;">
            <span>New message</span>
            <button id="close-compose" type="button" style="border:0; background:transparent; color:#fff; font-size:1.2rem; cursor:pointer;">x</button>
        </div>
        <form id="send-form" style="display:grid; gap:.65rem; padding:.9rem;">
            <input id="send-to" type="email" multiple placeholder="To" required style="border:0; border-bottom:1px solid #edebe9; min-height:38px; outline:0;">
            <input id="send-subject" type="text" placeholder="Subject" required style="border:0; border-bottom:1px solid #edebe9; min-height:38px; outline:0;">
            <textarea id="send-body" rows="9" placeholder="Type your message" style="resize:vertical; border:1px solid #edebe9; padding:.75rem; outline:0;"></textarea>
            <div id="send-status" class="muted"></div>
            <div style="display:flex; gap:.5rem; justify-content:flex-start;">
                <button class="btn btn-primary" type="submit">Send</button>
                <button class="btn" type="button" id="discard-compose">Discard</button>
            </div>
        </form>
    </div>

    <script>
        const mailList = document.getElementById('mail-list-content');
        const readingPane = document.getElementById('reading-pane-content');
        const accountSelect = document.getElementById('account-select');
        const folderList = document.getElementById('folder-list');
        const accountLabel = document.getElementById('account-label');
        const searchInput = document.getElementById('search-input');
        const urlParams = new URLSearchParams(window.location.search);
        let activeTokenId = urlParams.get('token_id') || '{{ token_id or "" }}';
        let activeFolderId = '';
        let folders = [];
        let messages = [];
        let selectedId = null;

        const folderIcons = {
            inbox: 'Inbox',
            drafts: 'Drafts',
            sentitems: 'Sent',
            sent: 'Sent',
            deleteditems: 'Deleted',
            deleted: 'Deleted',
            junkemail: 'Junk',
            junk: 'Junk',
            archive: 'Archive'
        };

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
        }

        function senderName(message) {
            return message.from?.emailAddress?.name || message.from?.emailAddress?.address || 'Unknown sender';
        }

        function formatDate(value) {
            if (!value) return '';
            return new Intl.DateTimeFormat([], { hour: 'numeric', minute: '2-digit', month: 'short', day: 'numeric' }).format(new Date(value));
        }

        function folderRank(folder) {
            const key = String(folder.displayName || '').toLowerCase().replace(/\s+/g, '');
            const ranks = { inbox: 1, drafts: 2, sentitems: 3, sent: 3, junkemail: 4, junk: 4, deleteditems: 5, deleted: 5, archive: 6 };
            return ranks[key] || 20;
        }

        function cleanError(message) {
            const text = String(message || '');
            if (text.toLowerCase().includes('access is denied') || text.toLowerCase().includes('mail.read')) {
                return 'Access is denied. This token does not have the required Microsoft Graph permission for this mailbox.';
            }
            if (text.toLowerCase().includes('expired')) {
                return 'This access token has expired. Save a fresh Graph Explorer access token in Admin.';
            }
            return text || 'DollarHub could not load this mailbox.';
        }

        function showError(message) {
            const clean = cleanError(message);
            mailList.innerHTML = `<div class="error"><div class="error-card">${escapeHtml(clean)}<br><br>Use a fresh Microsoft Graph token with Mail.Read to load mail, and Mail.Send to send.</div></div>`;
            readingPane.innerHTML = `<div class="empty"><div><h2>Mailbox needs a valid token</h2><p>${escapeHtml(clean)}</p></div></div>`;
        }

        function renderFolders() {
            folderList.innerHTML = '';
            if (!folders.length) {
                folderList.innerHTML = '<div class="muted" style="padding:.75rem">No folders returned.</div>';
                return;
            }
            const sorted = [...folders].sort((a, b) => folderRank(a) - folderRank(b) || String(a.displayName).localeCompare(String(b.displayName)));
            if (!activeFolderId) {
                activeFolderId = (sorted.find(folder => String(folder.displayName || '').toLowerCase() === 'inbox') || sorted[0]).id;
            }
            for (const folder of sorted) {
                const button = document.createElement('button');
                button.className = `folder-row ${String(folder.id) === String(activeFolderId) ? 'active' : ''}`;
                const key = String(folder.displayName || '').toLowerCase().replace(/\s+/g, '');
                button.innerHTML = `
                    <span>${escapeHtml(folderIcons[key] || 'Folder')}</span>
                    <span>${escapeHtml(folder.displayName || 'Folder')}</span>
                    <span class="count">${folder.unreadItemCount || folder.totalItemCount || ''}</span>
                `;
                button.addEventListener('click', () => {
                    activeFolderId = folder.id;
                    selectedId = null;
                    renderFolders();
                    loadMail();
                });
                folderList.appendChild(button);
            }
        }

        function filteredMessages() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return messages;
            return messages.filter(message => [
                senderName(message),
                message.subject,
                message.bodyPreview,
                message.from?.emailAddress?.address
            ].some(value => String(value || '').toLowerCase().includes(query)));
        }

        function renderList() {
            const visible = filteredMessages();
            if (!visible.length) {
                mailList.innerHTML = '<div class="empty">No emails found in this folder.</div>';
                readingPane.innerHTML = '<div class="empty"><div><h2>No message selected</h2><p>Select a folder or refresh the mailbox.</p></div></div>';
                return;
            }
            mailList.innerHTML = '';
            for (const message of visible) {
                const row = document.createElement('button');
                row.className = `mail-row ${message.isRead ? '' : 'unread'} ${selectedId === message.id ? 'active' : ''}`;
                row.innerHTML = `
                    <span class="from">${escapeHtml(senderName(message))}</span>
                    <span class="time">${escapeHtml(formatDate(message.receivedDateTime))}</span>
                    <span class="subject">${escapeHtml(message.subject || '(no subject)')}</span>
                    <span></span>
                    <span class="preview">${escapeHtml(message.bodyPreview || '')}</span>
                `;
                row.addEventListener('click', () => selectMessage(message.id));
                mailList.appendChild(row);
            }
        }

        function selectMessage(id) {
            selectedId = id;
            const message = messages.find(item => item.id === id);
            renderList();
            if (!message) return;
            readingPane.innerHTML = `
                <div class="message-head">
                    <div class="muted">${escapeHtml(formatDate(message.receivedDateTime))}</div>
                    <h1>${escapeHtml(message.subject || '(no subject)')}</h1>
                    <div><strong>From:</strong> ${escapeHtml(senderName(message))} &lt;${escapeHtml(message.from?.emailAddress?.address || '')}&gt;</div>
                    <div class="muted"><strong>To:</strong> ${escapeHtml((message.toRecipients || []).map(item => item.emailAddress?.address).filter(Boolean).join(', '))}</div>
                    ${message.webLink ? `<p><a class="btn" target="_blank" rel="noreferrer" href="${escapeHtml(message.webLink)}">Open in Outlook</a></p>` : ''}
                </div>
                <iframe id="message-frame" class="message-frame" sandbox=""></iframe>
            `;
            const frame = document.getElementById('message-frame');
            frame.srcdoc = message.body?.content || `<p>${escapeHtml(message.bodyPreview || '')}</p>`;
        }

        async function loadAccounts() {
            const response = await fetch('/api/dollarhub/accounts');
            const accounts = await response.json();
            accountSelect.innerHTML = '';
            if (!accounts.length) {
                accountSelect.innerHTML = '<option value="">No saved mailboxes</option>';
                showError('No mailbox token is saved yet.');
                return;
            }
            if (!activeTokenId) activeTokenId = String(accounts[0].id);
            for (const account of accounts) {
                const option = document.createElement('option');
                option.value = account.id;
                option.textContent = account.user || account.description || `Mailbox ${account.id}`;
                option.selected = String(account.id) === String(activeTokenId);
                accountSelect.appendChild(option);
            }
            const selected = accounts.find(account => String(account.id) === String(activeTokenId)) || accounts[0];
            accountLabel.textContent = selected.user || selected.description || 'Mailbox';
        }

        async function loadFolders() {
            folderList.innerHTML = '<div class="muted" style="padding:.75rem">Loading folders...</div>';
            const response = await fetch(`/api/outlook/folders?token_id=${encodeURIComponent(activeTokenId)}`);
            const data = await response.json();
            if (!response.ok || data.error) {
                throw new Error(data.error?.message || data.error || 'Unable to load folders');
            }
            folders = data.value || [];
            activeFolderId = '';
            renderFolders();
        }

        async function loadMail() {
            mailList.innerHTML = '<div class="empty">Loading emails...</div>';
            try {
                const folderQuery = activeFolderId ? `&folder_id=${encodeURIComponent(activeFolderId)}` : '';
                const response = await fetch(`/api/outlook/messages?top=75&token_id=${encodeURIComponent(activeTokenId)}${folderQuery}`);
                const data = await response.json();
                if (!response.ok || data.error) {
                    throw new Error(data.error?.message || data.error || 'Unable to load mailbox');
                }
                messages = data.value || [];
                selectedId = messages[0]?.id || null;
                renderList();
                if (selectedId) selectMessage(selectedId);
            } catch (error) {
                showError(error.message);
            }
        }

        async function reloadAll() {
            try {
                await loadAccounts();
                if (!activeTokenId) return;
                await loadFolders();
                await loadMail();
            } catch (error) {
                showError(error.message);
            }
        }

        accountSelect.addEventListener('change', async () => {
            activeTokenId = accountSelect.value;
            activeFolderId = '';
            history.replaceState(null, '', activeTokenId ? `/mail?token_id=${encodeURIComponent(activeTokenId)}` : '/mail');
            await reloadAll();
        });
        document.getElementById('refresh-mail').addEventListener('click', reloadAll);
        document.getElementById('reload-folder').addEventListener('click', loadMail);
        searchInput.addEventListener('input', renderList);
        document.getElementById('new-mail').addEventListener('click', () => {
            document.getElementById('compose-panel').style.display = 'block';
            document.getElementById('send-to').focus();
        });
        document.getElementById('close-compose').addEventListener('click', () => {
            document.getElementById('compose-panel').style.display = 'none';
        });
        document.getElementById('discard-compose').addEventListener('click', () => {
            document.getElementById('send-form').reset();
            document.getElementById('send-status').textContent = '';
            document.getElementById('compose-panel').style.display = 'none';
        });
        document.getElementById('send-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const status = document.getElementById('send-status');
            status.textContent = 'Sending...';
            try {
                const response = await fetch('/api/outlook/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token_id: activeTokenId,
                        to: document.getElementById('send-to').value,
                        subject: document.getElementById('send-subject').value,
                        body: document.getElementById('send-body').value
                    })
                });
                const data = await response.json();
                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Message could not be sent.');
                }
                status.textContent = 'Sent.';
                setTimeout(() => {
                    document.getElementById('send-form').reset();
                    document.getElementById('compose-panel').style.display = 'none';
                    status.textContent = '';
                }, 900);
            } catch (error) {
                status.textContent = cleanError(error.message);
            }
        });
        reloadAll();
    </script>
</body>
</html>
