<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mailbox Connected - DollarHub</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: grid;
            place-items: center;
            padding: 1.25rem;
        }
        main {
            width: min(680px, 100%);
            background: #182238;
            border: 1px solid rgba(148, 163, 184, .18);
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 24px 70px rgba(0, 0, 0, .32);
        }
        .mark {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(34, 197, 94, .14);
            color: #4ade80;
            display: grid;
            place-items: center;
            font-size: 1.8rem;
            margin-bottom: 1.25rem;
        }
        h1 { margin: 0 0 .75rem; font-size: clamp(2rem, 6vw, 3.1rem); line-height: 1; letter-spacing: 0; }
        p { margin: 0; color: #9aa8bd; font-size: 1.05rem; line-height: 1.6; }
    </style>
</head>
<body>
    <main>
        <div class="mark">✓</div>
        <h1>Mailbox connected</h1>
        <p>Your mailbox has been connected to DollarHub. You can close this page now.</p>
    </main>
</body>
</html>
